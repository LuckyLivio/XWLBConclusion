name: Daily News Fetch

on:
  schedule:
    # Run every day at 13:40 UTC (21:40 Beijing Time)
    - cron: '40 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch news
        run: node index.js

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "chore: update news $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
